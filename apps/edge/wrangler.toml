# Deployed manually (`npx wrangler deploy` from apps/edge), never from CI.
# Secret set via `npx wrangler secret put OPENROUTER_API_KEY`.
name = "ppi-distill"
main = "src/worker.ts"
compatibility_date = "2026-06-01"

[[kv_namespaces]]
binding = "DISTILL_KV"
# Created at deploy time via `wrangler kv namespace create DISTILL_KV`.
id = "00000000000000000000000000000000"

[[unsafe.bindings]]
name = "RATE_LIMIT"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 6, period = 60 }
