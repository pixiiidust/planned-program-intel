name: CI & gated Pages deploy

# Deploys are gated on green typecheck + unit tests + e2e. A red run never
# deploys — the previously deployed site stays live (stale beats broken).
# Since the slice-1 cutover (#11) the real build serves at the root URL;
# /app/ (the pre-cutover staging path) redirects there.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Validate seed bundle (domain contracts)
        run: npm run -w @ppi/pipeline validate
      - name: Build app
        run: npm run build
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: e2e (recruiter journey)
        run: npm run e2e
      - name: Assemble site (real build at root; /app/ redirects)
        run: |
          mkdir -p _site/app
          cp -r apps/web/dist/. _site/
          printf '<!doctype html><meta http-equiv="refresh" content="0; url=../"><link rel="canonical" href="../">' > _site/app/index.html
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: verify
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
