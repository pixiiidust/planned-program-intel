name: Contract suite (Postgres adapter)

# Deliberately separate from the Pages deploy - the demo never gates on
# Postgres (ADR-0001). A red run here blocks nothing.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - name: Install
        run: npm ci
      - name: Start Postgres
        run: docker compose up -d --wait
      - name: Contract suite
        run: npm run test:contract:pg
